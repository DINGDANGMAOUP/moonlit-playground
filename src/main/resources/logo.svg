<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="moonlit-playground-title moonlit-playground-description">
  <title id="moonlit-playground-title">Moonlit Playground</title>
  <desc id="moonlit-playground-description">A crescent moon beside a glowing code window on a midnight background.</desc>
  <defs>
    <linearGradient id="night" x1="18" y1="12" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242957"/>
      <stop offset="0.55" stop-color="#151933"/>
      <stop offset="1" stop-color="#090B18"/>
    </linearGradient>
    <radialGradient id="sky-glow" cx="0" cy="0" r="1" gradientTransform="translate(36 28) rotate(47) scale(78)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity=".28"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moon" x1="24" y1="30" x2="67" y2="83" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset=".58" stop-color="#FACC15"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="code" x1="60" y1="59" x2="99" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset=".52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="128" height="128" fill="#000"/>
      <circle cx="43" cy="58" r="27" fill="#fff"/>
      <circle cx="55" cy="47" r="24" fill="#000"/>
    </mask>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect x="5" y="5" width="118" height="118" rx="31" fill="url(#night)"/>
  <rect x="5.75" y="5.75" width="116.5" height="116.5" rx="30.25" fill="none" stroke="#fff" stroke-opacity=".1" stroke-width="1.5"/>
  <rect x="5" y="5" width="118" height="118" rx="31" fill="url(#sky-glow)"/>

  <circle cx="29" cy="28" r="2.2" fill="#E0F2FE"/>
  <path d="M88 25v8M84 29h8" stroke="#FDE68A" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="103" cy="40" r="1.6" fill="#C4B5FD"/>

  <circle cx="43" cy="58" r="27" fill="url(#moon)" mask="url(#crescent)"/>
  <circle cx="35" cy="71" r="3" fill="#FFF7D6" fill-opacity=".38" mask="url(#crescent)"/>

  <g filter="url(#lift)">
    <rect x="50" y="48" width="61" height="52" rx="13" fill="#10142B" fill-opacity=".96"/>
    <rect x="51" y="49" width="59" height="50" rx="12" fill="none" stroke="#93C5FD" stroke-opacity=".5" stroke-width="2"/>
    <path d="M51 61h59" stroke="#93C5FD" stroke-opacity=".18" stroke-width="2"/>
    <circle cx="60" cy="55" r="2" fill="#FB7185"/>
    <circle cx="67" cy="55" r="2" fill="#FACC15"/>
    <circle cx="74" cy="55" r="2" fill="#34D399"/>
    <path d="m68 70-7 7 7 7M92 70l7 7-7 7M84 66l-8 22" fill="none" stroke="url(#code)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
